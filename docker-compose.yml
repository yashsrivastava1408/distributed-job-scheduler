version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: job_scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push --accept-data-loss && npx tsx src/api/index.ts"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_scheduler
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      SCHEDULER_POLL_INTERVAL_MS: "5000"
      REAPER_POLL_INTERVAL_MS: "15000"
      REAPER_STALE_THRESHOLD_MS: "30000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_scheduler
      API_INTERNAL_URL: http://api:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      WORKER_CONCURRENCY: "5"
      WORKER_POLL_INTERVAL_MS: "2000"
      WORKER_QUEUES: default
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
