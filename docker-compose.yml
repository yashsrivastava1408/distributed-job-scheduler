version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push --accept-data-loss && npx tsx src/api/index.ts"
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      SCHEDULER_POLL_INTERVAL_MS: "5000"
      REAPER_POLL_INTERVAL_MS: "15000"
      REAPER_STALE_THRESHOLD_MS: "30000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_INTERNAL_URL: http://api:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      WORKER_CONCURRENCY: "5"
      WORKER_POLL_INTERVAL_MS: "2000"
      WORKER_QUEUES: default
      NODE_ENV: production
    depends_on:
      - api
    deploy:
      replicas: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    restart: always
    depends_on:
      - api
